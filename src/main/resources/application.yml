spring:
    application:
        name: disc-hard
    datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        properties:
            hibernate:
                format_sql: true
#    flyway:
#        enabled: true
#        baseline-on-migrate: true
#        locations: classpath:db/migration

server:
    servlet:
        context-path: /api/v1
    error:
        include-message: always
        include-binding-errors: always

