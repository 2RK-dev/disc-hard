asyncapi: 2.6.0
info:
  title: DiscHard WebSocket API for Spring Boot and Next.js
  version: 1.0.0
  description: WebSocket API using STOMP for real-time messaging in DiscHard application

servers:
  production:
    url: ws://localhost:8080/ws
    protocol: ws
    description: DiscHard WebSocket server with STOMP support

channels:
  /app/connect:
    publish:
      summary: Connect and authenticate to the WebSocket server
      operationId: connectWebSocket
      message:
        $ref: '#/components/messages/ConnectionRequest'

  /app/messages:
    publish:
      summary: Send a new message to an existing conversation
      operationId: sendMessage
      message:
        $ref: '#/components/messages/SendMessage'

  /app/conversations/new:
    publish:
      summary: Start a new conversation with a user
      operationId: startNewConversation
      message:
        $ref: '#/components/messages/StartConversation'

  /topic/conversations/{conversationId}:
    parameters:
      conversationId:
        description: ID of the conversation
        schema:
          type: string
    subscribe:
      summary: Receive new messages in a specific conversation
      operationId: receiveConversationMessages
      message:
        $ref: '#/components/messages/ReceivedMessage'

  /user/queue/messages:
    subscribe:
      summary: Receive messages directed to the current user
      operationId: receiveUserMessages
      message:
        $ref: '#/components/messages/ReceivedMessage'

  /app/typing:
    publish:
      summary: Send typing indicator
      operationId: sendTypingIndicator
      message:
        $ref: '#/components/messages/TypingIndicator'

  /topic/conversations/{conversationId}/typing:
    parameters:
      conversationId:
        description: ID of the conversation
        schema:
          type: string
    subscribe:
      summary: Receive typing indicators for a specific conversation
      operationId: receiveTypingIndicators
      message:
        $ref: '#/components/messages/TypingIndicator'

  /app/status:
    publish:
      summary: Update current user's status
      operationId: updateUserStatus
      message:
        $ref: '#/components/messages/UpdateUserStatus'

  /topic/users/status:
    subscribe:
      summary: Receive status updates of all users
      operationId: receiveUserStatusUpdates
      message:
        $ref: '#/components/messages/UserStatusUpdate'

  /topic/conversations/updates:
    subscribe:
      summary: Receive updates about conversations (new, modified, members)
      operationId: receiveConversationsUpdates
      message:
        oneOf:
          - $ref: '#/components/messages/ConversationCreated'
          - $ref: '#/components/messages/ConversationUpdated'
          - $ref: '#/components/messages/MembershipChanged'

  /user/queue/notifications:
    subscribe:
      summary: Receive user-specific notifications
      operationId: receiveUserNotifications
      message:
        $ref: '#/components/messages/UserNotification'

components:
  messages:
    ConnectionRequest:
      name: ConnectionRequest
      title: WebSocket Connection Request
      summary: Authentication request for WebSocket connection
      contentType: application/json
      payload:
        type: object
        properties:
          token:
            type: string
            description: JWT token for authentication
        required:
          - token


    StartConversation:
      name: StartConversation
      title: Start New Conversation Request
      summary: Request to start a new conversation with a user
      contentType: application/json
      payload:
        type: object
        properties:
          targetUserId:
            type: number
            description: ID of the user to start conversation with
          initialMessage:
            type: object
            properties:
              type:
                type: string
                enum: [ text ]
                description: Type of message
              textContent:
                type: string
                description: Content of the initial message
              timestamp:
                type: string
                format: date-time
                description: Time when message was sent
        required:
          - targetUserId
          - initialMessage

    SendMessage:
      name: SendMessage
      title: New Message
      summary: A new message to be sent
      contentType: application/json
      payload:
        type: object
        properties:
          conversationId:
            type: number
            description: ID of the conversation
          type:
            type: string
            enum: [ text ]
            description: Type of message
          textContent:
            type: string
            description: Content of the message
          timestamp:
            type: string
            format: date-time
        required:
          - conversationId
          - type
          - timestamp

    ReceivedMessage:
      name: ReceivedMessage
      title: Message Received
      summary: A message received from the server
      contentType: application/json
      payload:
        type: object
        properties:
          conversationId:
            type: number
            description: ID of the conversation
          message:
            $ref: 'commons.yml#/components/schemas/Message'

    TypingIndicator:
      name: TypingIndicator
      title: Typing Indicator
      summary: Indicates a user is typing in a conversation
      contentType: application/json
      payload:
        type: object
        properties:
          conversationId:
            type: number
            description: ID of the conversation
          memberId:
            type: number
            description: ID of the member who's typing
          isTyping:
            type: boolean
            description: Whether the user is typing or stopped typing
          timestamp:
            type: string
            format: date-time
        required:
          - conversationId
          - memberId
          - isTyping
          - timestamp

    UpdateUserStatus:
      name: UpdateUserStatus
      title: User Status Update Request
      summary: Request to update the user's status
      contentType: application/json
      payload:
        type: object
        properties:
          status:
            type: string
            enum: [ online, offline, away, dnd ]
            description: New status of the user
        required:
          - status

    UserStatusUpdate:
      name: UserStatusUpdate
      title: User Status Update
      summary: Update on a user's status
      contentType: application/json
      payload:
        type: object
        properties:
          user:
            $ref: 'commons.yml#/components/schemas/User'
          status:
            type: string
            enum: [ online, offline, away, do_not_disturb ]
            description: Current status of the user
        required:
          - user
          - status

    ConversationCreated:
      name: ConversationCreated
      title: Conversation Created
      summary: A new conversation has been created
      contentType: application/json
      payload:
        type: object
        properties:
          conversationId:
            type: number
            description: ID of the new conversation
          type:
            type: string
            enum: [ private, group ]
            description: Type of conversation
          name:
            type: string
            description: Name of the group (only for group conversations)
          createdBy:
            $ref: 'commons.yml#/components/schemas/User'
            description: User who created the conversation
          members:
            type: array
            items:
              $ref: 'commons.yml#/components/schemas/Member'
            description: List of members in the conversation
          timestamp:
            type: string
            format: date-time
            description: Time when conversation was created
        required:
          - conversationId
          - type
          - createdBy
          - members
          - timestamp

    ConversationUpdated:
      name: ConversationUpdated
      title: Conversation Updated
      summary: A conversation has been updated
      contentType: application/json
      payload:
        type: object
        properties:
          conversationId:
            type: number
            description: ID of the conversation
          name:
            type: string
            description: New name of the group
          description:
            type: string
            description: New description of the group
          updatedBy:
            $ref: 'commons.yml#/components/schemas/User'
            description: User who updated the conversation
          timestamp:
            type: string
            format: date-time
            description: Time when conversation was updated
        required:
          - conversationId
          - updatedBy
          - timestamp

    MembershipChanged:
      name: MembershipChanged
      title: Conversation Membership Changed
      summary: Members of a conversation have changed
      contentType: application/json
      payload:
        type: object
        properties:
          conversationId:
            type: number
            description: ID of the conversation
          type:
            type: string
            enum: [ added, removed ]
            description: Type of membership change
          users:
            type: array
            items:
              $ref: 'commons.yml#/components/schemas/User'
            description: List of Users who were added or removed
          changedBy:
            $ref: 'commons.yml#/components/schemas/User'
            description: User who made the change (null if user left voluntarily)
          timestamp:
            type: string
            format: date-time
            description: Time when membership changed
        required:
          - conversationId
          - type
          - users
          - timestamp

    UserNotification:
      name: UserNotification
      title: User Notification
      summary: A notification for the user
      contentType: application/json
      payload:
        type: object
        properties:
          id:
            type: number
            description: Unique notification ID
          type:
            type: string
            enum: [ message, invitation, system ]
            description: Type of notification
          title:
            type: string
            description: Short title of notification
          content:
            type: string
            description: Content of notification
          source:
            type: object
            properties:
              id:
                type: number
              type:
                type: string
                enum: [ user, conversation, system ]
              name:
                type: string
            description: Source of the notification
          timestamp:
            type: string
            format: date-time
            description: Time when notification was created
        required:
          - id
          - type
          - content
          - timestamp

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for WebSocket authentication