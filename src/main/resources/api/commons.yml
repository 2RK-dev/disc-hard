openapi: 3.1.0
info:
  title: Common schemas
  version: '1.0'
components:
  schemas:
    Participant:
      type: object
      properties:
        id:
          type: string
        alias:
          type: string
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
        name:
          type: string

    Message:
      type: object
      properties:
        id:
          type: string
          description: Unique message identifier
        type:
          type: string
          enum: [ text ]
          description: Type of message
        textContent:
          type: string
        timestamp:
          type: string
          format: date-time
          description: Time when message was sent
        sender:
          $ref: '#/components/schemas/Participant'

    Page:
      description: A page metadata in a paginated resource
      type: object
      properties:
        size:
          type: integer
          description: Number of elements per page
        totalElements:
          type: integer
          description: Total number of elements across all pages
        totalPages:
          type: integer
          description: Total number of pages
        number:
          type: integer
          description: Current page number