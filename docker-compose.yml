services:
    postgres:
        image: postgres:latest
        container_name: disc-hard-postgres
        environment:
            POSTGRES_DB: discharddb
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin
        ports:
            -   '5432:5432'
    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: pgadmin-dischard
        environment:
            PGADMIN_DEFAULT_EMAIL: changeme@gmail.com
            PGADMIN_DEFAULT_PASSWORD: changeme##123
        ports:
            -   '5050:80'
        depends_on:
            -   postgres